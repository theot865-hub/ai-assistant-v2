{% extends "base.html" %}
{% block title %}Login | Assistant v2 Web{% endblock %}
{% block content %}
<section class="card">
  <h2>Login</h2>
  <p>Log in to access campaign creation, draft review, and Gmail actions.</p>
  {% if error %}
    <p class="error">{{ error }}</p>
  {% endif %}
  <form method="post" action="/login" class="campaign-form">
    <div class="campaign-grid">
      <label for="email">Email</label>
      <input id="email" name="email" type="email" value="{{ email }}" required>

      <label for="password">Password</label>
      <input id="password" name="password" type="password" required>
    </div>
    <div class="campaign-actions">
      <button type="submit">Log in</button>
    </div>
  </form>
  <p><a href="/signup">Need an account? Sign up</a></p>
</section>
{% endblock %}
